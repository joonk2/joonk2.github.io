name: Sync problems.json

on:
  push:
    branches:
      - main
    paths:
      - "_posts/coding-test/datastructure-algorithm/**/*.md"
      - "scripts/generate_problems_json.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate problems.json
        run: python scripts/generate_problems_json.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- \
            _posts/coding-test/datastructure-algorithm/problems.json \
            assets/data/problems.json; then
            echo "No changes to commit."
            exit 0
          fi
          git add \
            _posts/coding-test/datastructure-algorithm/problems.json \
            assets/data/problems.json
          git commit -m "chore: sync problems.json from coding-test posts"
          git push
