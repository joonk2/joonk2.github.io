<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 AI Cat Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap');
        :root { --primary-color: #ff6b9d; --secondary-color: #ff8fab; --glass-bg: rgba(255, 255, 255, 0.98); --text-primary: #333; --text-secondary: #666; --kakao-bg: #bacee0; --kakao-bot-bubble: #ffffff; --kakao-user-bubble: #ffeb33; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #ff9a9e, #fad0c4); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; height: 85vh; background: var(--glass-bg); border-radius: 20px; box-shadow: 0 15px 45px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        @media (max-width: 600px) { body { padding: 0; } .container { height: 100vh; border-radius: 0; } }
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; flex-shrink: 0; z-index: 10; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: 600; color: #aaa; transition: all 0.3s; font-size: 0.95em; }
        .tab-btn.active { color: var(--primary-color); border-bottom: 3px solid var(--primary-color); }
        .view-content { flex: 1; display: none; flex-direction: column; min-height: 0; background: white; }
        .view-content.active { display: flex; }
        #view-chat { overflow: hidden; background: var(--kakao-bg); }
        #view-music { overflow-y: auto; }
        .chat-header {
            display: flex; align-items: center; gap: 12px; padding: 14px 20px;
            background: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(0,0,0,0.05); flex-shrink: 0;
        }
        .chat-header-avatar {
            width: 45px; height: 45px; border-radius: 18px; object-fit: cover;
            border: 2px solid var(--primary-color);
        }
        .chat-header-info h2 { font-size: 1.05em; font-weight: 700; color: var(--text-primary); margin: 0; }
        .chat-header-status {
            display: flex; align-items: center; gap: 5px; font-size: 0.75em; color: var(--text-secondary); margin-top: 2px;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; background: #4cd964;
        }
        #chat-area {
            flex: 1; padding: 20px; overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column; gap: 12px;
            background: var(--kakao-bg);
            scroll-behavior: smooth;
        }
        .chat-date-divider {
            align-self: center; font-size: 0.75em; color: #707e8a; background: rgba(0,0,0,0.08);
            padding: 5px 16px; border-radius: 15px; margin: 15px 0;
        }
        .msg-row {
            display: flex; align-items: flex-start; gap: 10px; max-width: 90%;
            animation: msgIn 0.2s ease-out;
        }
        .msg-row.bot { align-self: flex-start; }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-avatar {
            width: 38px; height: 38px; border-radius: 15px; object-fit: cover; flex-shrink: 0;
        }
        .msg-avatar.user-avatar {
            background: var(--kakao-user-bubble);
            display: flex; align-items: center; justify-content: center;
            color: #333; font-size: 0.75em; font-weight: 700; border-radius: 15px;
        }
        .msg-body { display: flex; flex-direction: column; gap: 4px; max-width: calc(100% - 48px); }
        .msg-row.user .msg-body { align-items: flex-end; }
        .msg-sender { font-size: 0.75em; color: #4e5968; margin-left: 2px; }
        .msg-row.user .msg-sender { display: none; }
        .msg-bubble {
            padding: 10px 14px; border-radius: 12px; font-size: 0.92em; line-height: 1.5;
            word-break: break-word; white-space: pre-wrap;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            position: relative;
        }
        .msg-row.bot .msg-bubble {
            background: var(--kakao-bot-bubble); color: #000;
            border-top-left-radius: 2px;
        }
        .msg-row.user .msg-bubble {
            background: var(--kakao-user-bubble);
            color: #000;
            border-top-right-radius: 2px;
        }
        .msg-time { font-size: 0.65em; color: #707e8a; margin-top: auto; padding: 0 2px; }
        .input-area {
            padding: 12px 16px 20px; display: flex; align-items: flex-end; gap: 10px;
            background: #fff; flex-shrink: 0;
        }
        #user-input {
            flex: 1; border: 1px solid #ddd; padding: 12px 16px; border-radius: 10px;
            outline: none; font-size: 0.95em; font-family: inherit;
            resize: none; max-height: 120px; line-height: 1.4;
            background: #f9f9f9;
        }
        #user-input:focus { border-color: #ccc; background: #fff; }
        #send-btn {
            background: #ffeb33; color: #333; border: 1px solid #f0de2e;
            width: 50px; height: 42px; border-radius: 8px; cursor: pointer; flex-shrink: 0;
            font-weight: 700; font-size: 0.9em;
            display: flex; align-items: center; justify-content: center;
        }
        #send-btn:hover { background: #fbe300; }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .playlist-header { padding: 20px; text-align: center; background: #fffafb; }
        .playlist-header img { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; }
        .playlist-list { padding: 10px; }
        .playlist-item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-radius: 12px; transition: background 0.2s; margin-bottom: 5px; }
        .playlist-item:hover { background: #fff0f3; }
        .playlist-item.active { background: #ffe5ea; color: var(--primary-color); font-weight: 700; }
        .mini-player { background: #fff; padding: 12px 15px; border-top: 1px solid #eee; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .mini-album-art { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; animation: catRotate 10s linear infinite; animation-play-state: paused; }
        .mini-album-art.playing { animation-play-state: running; }
        @keyframes catRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .mini-info { flex: 1; overflow: hidden; }
        .mini-info h4 { font-size: 0.85em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-controls { display: flex; gap: 12px; font-size: 1.1em; color: #555; }
        .mini-controls i { cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="tabs">
        <button class="tab-btn" id="tab-chat" onclick="showView('chat')"><i class="fas fa-comment-dots"></i> AI 고양이</button>
        <button class="tab-btn" id="tab-music" onclick="showView('music')"><i class="fas fa-music"></i> 플레이리스트</button>
    </div>
    <div id="view-chat" class="view-content">
        <header class="chat-header">
            <img class="chat-header-avatar" src="https://github.com/joonk2/mySvg/blob/main/chill-kitty-loop-unlimited.gif?raw=true" alt="비사">
            <div class="chat-header-info">
                <h2>비사 🐾</h2>
                <div class="chat-header-status"><span class="status-dot"></span> 온라인</div>
            </div>
        </header>
        <div id="chat-area"></div>
        <div class="input-area">
            <textarea id="user-input" rows="1" placeholder="메시지를 입력하세요..." aria-label="메시지 입력"></textarea>
            <button id="send-btn" type="button" aria-label="보내기"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <div id="view-music" class="view-content">
        <div class="playlist-header"><img src="https://github.com/joonk2/mySvg/blob/main/chill-kitty-loop-unlimited.gif?raw=true" alt="cat"><h3 style="font-size: 1em; color: var(--primary-color);">My Playlist 🎵</h3></div>
        <div class="playlist-list" id="playlist-items"></div>
    </div>
    <div class="mini-player">
        <img src="https://github.com/joonk2/mySvg/blob/main/chill-kitty-loop-unlimited.gif?raw=true" class="mini-album-art" id="m-art">
        <div class="mini-info"><h4 id="m-title">곡 로딩 중...</h4></div>
        <div class="mini-controls"><i class="fas fa-step-backward" onclick="prevMusic()"></i><i class="fas fa-play" id="m-play-icon" onclick="togglePlay()"></i><i class="fas fa-step-forward" onclick="nextMusic()"></i></div>
    </div>
</div>
<script>
    const musicData = [
        { title: "i love egg", url: "https://github.com/joonk2/music/raw/music/i-love-egg.mp3" },
        { title: "cookier-run-violin", url: "https://github.com/joonk2/music/raw/music/cookier-run-violin.mp3" },
        { title: "fantasy-01", url: "https://github.com/joonk2/music/raw/music/suno-fantasy-01.mp3" },
        { title: "cookie-run-frozen-tower", url: "https://github.com/joonk2/music/raw/music/cookie-run-frozen-tower.mp3" }
    ];
    const CAT_AVATAR = 'https://github.com/joonk2/mySvg/blob/main/chill-kitty-loop-unlimited.gif?raw=true';
    let audio = new Audio();
    let currentIdx = 0;
    let isPlaying = false;
    let isChatLoading = false;
    let typingEl = null;
    const chatHistory = [];

    function extractBotText(data) {
        const parts = data?.candidates?.[0]?.content?.parts;
        if (Array.isArray(parts)) {
            const text = parts.map((p) => p?.text).filter(Boolean).join('\n').trim();
            if (text) return text;
        }
        return null;
    }
    function extractErrorMessage(data, response) {
        if (data?.error?.message) return data.error.message;
        if (typeof data?.error === 'string') return data.error;
        if (!response.ok) return '서버 오류 (' + response.status + ')';
        const reason = data?.candidates?.[0]?.finishReason;
        return reason ? '답변 중단 (' + reason + ')' : '응답 형식을 이해하지 못했어요';
    }

    function formatTime(date) {
        return date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: true });
    }
    function formatDateLabel(date) {
        const today = new Date();
        if (date.toDateString() === today.toDateString()) return '\uc624\ub298';
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        if (date.toDateString() === yesterday.toDateString()) return '\uc5b4\uc81c';
        return date.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
    }
    function scrollChatToBottom() {
        const area = document.getElementById('chat-area');
        requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; });
    }
    function resizeInput() {
        const input = document.getElementById('user-input');
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 88) + 'px';
    }
    function setChatLoading(loading) {
        isChatLoading = loading;
        document.getElementById('send-btn').disabled = loading;
        if (loading) showTyping();
        else hideTyping();
    }
    function showTyping() {
        const area = document.getElementById('chat-area');
        if (!typingEl) {
            typingEl = document.createElement('div');
            typingEl.className = 'msg-row bot typing-row visible';
            typingEl.innerHTML = '<img class="msg-avatar" src="' + CAT_AVATAR + '" alt="">' +
                '<div class="msg-body"><span class="msg-sender">\ube44\uc0ac</span>' +
                '<div class="typing-bubble"><span></span><span></span><span></span></div></div>';
        }
        area.appendChild(typingEl);
        scrollChatToBottom();
    }
    function hideTyping() {
        if (typingEl && typingEl.parentNode) typingEl.parentNode.removeChild(typingEl);
        typingEl = null;
    }
    function appendDateDivider(date) {
        const area = document.getElementById('chat-area');
        const divider = document.createElement('div');
        divider.className = 'chat-date-divider';
        divider.textContent = formatDateLabel(date);
        area.appendChild(divider);
    }
    function appendMessage(sender, text) {
        const area = document.getElementById('chat-area');
        const now = new Date();
        const label = formatDateLabel(now);
        const lastDivider = area.querySelector('.chat-date-divider:last-of-type');
        if (!lastDivider || lastDivider.textContent !== label) appendDateDivider(now);

        const row = document.createElement('div');
        row.className = 'msg-row ' + sender;
        const avatarHtml = sender === 'bot'
            ? '<img class="msg-avatar" src="' + CAT_AVATAR + '" alt="\ube44\uc0ac">'
            : '<div class="msg-avatar user-avatar">\ub098</div>';
        row.innerHTML = avatarHtml +
            '<div class="msg-body">' +
            (sender === 'bot' ? '<span class="msg-sender">\ube44\uc0ac</span>' : '') +
            '<div class="msg-bubble"></div>' +
            '<span class="msg-time">' + formatTime(now) + '</span></div>';
        row.querySelector('.msg-bubble').textContent = text;
        area.appendChild(row);
        scrollChatToBottom();
        if (sender === 'user' || sender === 'bot') {
            chatHistory.push({ role: sender === 'user' ? 'user' : 'assistant', content: text });
            if (chatHistory.length > 16) chatHistory.splice(0, chatHistory.length - 16);
        }
    }
    function initChat() {
        appendMessage('bot', '\uc548\ub155! \ub098\ub294 \uace0\uc900\ud658\ub2d8 \ube14\ub85c\uadf8\uc758 AI \uace0\uc591\uc774 \ube44\uc0ac\ub2e4\ub0d5 \ud83d\udc3e\n\uad81\uae08\ud55c \uac70 \uc788\uc73c\uba74 \ud3b8\ud558\uac8c \ubb3c\uc5b4\ubd10!');
    }

    function showView(view) {
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + view).classList.add('active');
        document.getElementById('tab-' + view).classList.add('active');
    }
    function createPlaylist() {
        const list = document.getElementById('playlist-items');
        musicData.forEach((song, i) => {
            const item = document.createElement('div');
            item.className = 'playlist-item';
            item.id = 'item-' + i;
            item.innerHTML = '<i class="fas fa-play" style="font-size:0.7em; opacity:0.5;"></i> ' + song.title;
            item.onclick = () => playTrack(i);
            list.appendChild(item);
        });
    }
    function loadTrack(idx) {
        currentIdx = idx;
        audio.src = musicData[idx].url;
        document.getElementById('m-title').innerText = musicData[idx].title;
        document.querySelectorAll('.playlist-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById('item-' + idx);
        if (activeItem) activeItem.classList.add('active');
    }
    function playTrack(idx) { loadTrack(idx); audio.play().catch(e => console.log(e)); isPlaying = true; updatePlayerUI(); }
    function togglePlay() { if (isPlaying) audio.pause(); else audio.play().catch(e => e); isPlaying = !isPlaying; updatePlayerUI(); }
    function updatePlayerUI() {
        document.getElementById('m-play-icon').className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
        document.getElementById('m-art').classList.toggle('playing', isPlaying);
    }
    function nextMusic() { currentIdx = (currentIdx + 1) % musicData.length; playTrack(currentIdx); }
    function prevMusic() { currentIdx = (currentIdx - 1 + musicData.length) % musicData.length; playTrack(currentIdx); }
    audio.onended = nextMusic;

    async function sendMessage() {
        if (isChatLoading) return;
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;
        appendMessage('user', text);
        input.value = '';
        resizeInput();
        setChatLoading(true);
        try {
            const response = await fetch('https://blog-chatbot.with-joonk.workers.dev', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: text,
                    history: chatHistory.slice(0, -1)
                })
            });
            const data = await response.json();
            const reply = extractBotText(data);
            if (reply) {
                appendMessage('bot', reply);
            } else {
                appendMessage('bot', '냥... ' + extractErrorMessage(data, response));
            }
        } catch (e) {
            console.error('Chat Error:', e);
            appendMessage('bot', '연결 실패했다옹! (' + e.message + ')');
        } finally {
            setChatLoading(false);
        }
    }

    (function init() {
        const mode = new URLSearchParams(window.location.search).get('mode') || 'chat';
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        input.addEventListener('input', resizeInput);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        sendBtn.addEventListener('click', sendMessage);
        initChat();
        createPlaylist();
        loadTrack(0);
        showView(mode);
        setTimeout(() => { playTrack(0); }, 300);
    })();
</script>
</body>
</html>
