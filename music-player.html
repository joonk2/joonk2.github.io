<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 AI Cat & Music</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap');

        :root {
            --primary-color: #ff6b9d;
            --secondary-color: #ff8fab;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --chat-bg: #f8f9fa;
            --text-primary: #333333;
            --text-secondary: #666666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 350px;
            height: 650px;
            background: var(--glass-bg);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Header */
        .header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-bottom: 1px solid #eee;
        }
        .header h2 { font-size: 1.1em; color: var(--primary-color); }
        .close-btn { border: none; background: none; cursor: pointer; color: #ccc; }

        /* Chat Area */
        #chat-area {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #fff;
        }

        .msg { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 0.9em; line-height: 1.4; position: relative; }
        .msg.bot { align-self: flex-start; background: #f0f0f0; color: #333; border-bottom-left-radius: 2px; }
        .msg.user { align-self: flex-end; background: var(--primary-color); color: white; border-bottom-right-radius: 2px; }

        .cat-avatar { width: 40px; height: 40px; border-radius: 50%; margin-bottom: 5px; }

        /* Typing Indicator */
        .typing { font-style: italic; color: #aaa; font-size: 0.8em; display: none; }

        /* Input Area */
        .input-area { padding: 10px; display: flex; gap: 8px; background: white; border-top: 1px solid #eee; }
        #user-input { flex: 1; border: 1px solid #ddd; padding: 8px 12px; border-radius: 20px; outline: none; font-size: 0.9em; }
        #send-btn { background: var(--primary-color); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }

        /* Music Player (Mini) */
        .music-player {
            background: #fff;
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .song-info { display: flex; align-items: center; gap: 10px; }
        .mini-album-art { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; animation: rotate 10s linear infinite; animation-play-state: paused; }
        .mini-album-art.playing { animation-play-state: running; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .song-details { flex: 1; overflow: hidden; }
        .song-details h3 { font-size: 0.9em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-details p { font-size: 0.75em; color: #888; }

        .player-controls { display: flex; align-items: center; justify-content: center; gap: 15px; }
        .p-btn { background: none; border: none; cursor: pointer; color: #555; font-size: 1.1em; }
        .play-main { font-size: 1.5em; color: var(--primary-color); }

        .progress-bar-container { height: 4px; background: #eee; border-radius: 2px; width: 100%; cursor: pointer; position: relative; }
        .progress-bar-fill { height: 100%; background: var(--primary-color); width: 0%; border-radius: 2px; }

        /* API Key Overlay */
        #api-key-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; padding: 20px; text-align: center;
        }
        #api-key-input { margin-top: 10px; padding: 8px; border-radius: 5px; border: 1px solid #ddd; width: 80%; }
        .save-key-btn { margin-top: 10px; background: var(--primary-color); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

    </style>
</head>
<body>

<div class="container">
    <div id="api-key-overlay">
        <h3>🔑 Gemini API Key 필요</h3>
        <p style="font-size: 0.8em; color: #666; margin-top: 5px;">봇과 대화하려면 구글 API 키가 필요해요.<br>(브라우저에 안전하게 저장됩니다)</p>
        <input type="password" id="api-key-input" placeholder="AI Studio에서 받은 키 입력">
        <button class="save-key-btn" onclick="saveApiKey()">저장하고 시작하기</button>
        <a href="https://aistudio.google.com/app/apikey" target="_blank" style="font-size: 0.7em; margin-top: 10px; color: var(--primary-color);">키 어디서 받나요?</a>
    </div>

    <div class="header">
        <h2>🐱 AI 고양이 집사</h2>
        <button class="close-btn" onclick="window.close()"><i class="fas fa-times"></i></button>
    </div>

    <!-- Chat -->
    <div id="chat-area">
        <div class="msg bot">
            반가워요! 저는 코딩과 음악을 사랑하는 고양이 집사예요. 궁금한 게 있으면 물어보세요! 야옹~ 🐾
        </div>
    </div>
    <div class="typing" id="typing-indicator" style="margin-left: 15px; margin-bottom: 5px;">고양이가 생각 중...</div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendMessage()">
        <button id="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <!-- Music Player -->
    <div class="music-player">
        <div class="song-info">
            <img src="https://github.com/joonk2/mySvg/blob/main/chill-kitty-loop-unlimited.gif?raw=true" class="mini-album-art" id="album-art">
            <div class="song-details">
                <h3 id="m-title">준비 중...</h3>
                <p id="m-artist">-</p>
            </div>
        </div>
        <div class="progress-bar-container" id="p-container">
            <div class="progress-bar-fill" id="p-fill"></div>
        </div>
        <div class="player-controls">
            <button class="p-btn" onclick="prevMusic()"><i class="fas fa-step-backward"></i></button>
            <button class="p-btn play-main" id="m-play" onclick="togglePlay()"><i class="fas fa-play"></i></button>
            <button class="p-btn" onclick="nextMusic()"><i class="fas fa-step-forward"></i></button>
        </div>
    </div>
</div>

<script>
    // --- API & Chat Logic ---
    let API_KEY = localStorage.getItem('GEMINI_API_KEY');

    if (!API_KEY) {
        document.getElementById('api-key-overlay').style.display = 'flex';
    }

    function saveApiKey() {
        const key = document.getElementById('api-key-input').value.trim();
        if (key) {
            localStorage.setItem('GEMINI_API_KEY', key);
            API_KEY = key;
            document.getElementById('api-key-overlay').style.display = 'none';
            location.reload();
        }
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text || !API_KEY) return;

        appendMessage('user', text);
        input.value = '';
        
        const indicator = document.getElementById('typing-indicator');
        indicator.style.display = 'block';

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: `너는 '고준환'의 기술 블로그를 관리하는 고양이 챗봇이야. 
                        말끝마다 '냥', '야옹'을 붙여서 아주 귀엽게 대답해줘. 
                        질문자가 코딩이나 알고리즘, 수학에 대해 물어보면 친절하게 알려주고, 
                        고준환님에 대해 물어보면 훌륭한 개발자라고 칭찬해줘.
                        사용자의 질문: ${text}` }]
                    }]
                })
            });

            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;
            appendMessage('bot', reply);
        } catch (error) {
            appendMessage('bot', '미안하다냥... 네트워크 오류가 발생했다냥. API 키를 확인해달라옹!');
        } finally {
            indicator.style.display = 'none';
        }
    }

    function appendMessage(sender, text) {
        const chatArea = document.getElementById('chat-area');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${sender}`;
        msgDiv.innerText = text;
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    // --- Music Logic ---
    const musicData = [       
        { title: "i love egg", artist: "i-love-egg", url: "https://github.com/joonk2/music/raw/music/i-love-egg.mp3" },
        { title: "cookier-run-violin", artist: "dev sisters", url: "https://github.com/joonk2/music/raw/music/cookier-run-violin.mp3" },
        { title: "fantasy-01", artist: "Joonhwan.K", url: "https://github.com/joonk2/music/raw/music/suno-fantasy-01.mp3" },          
        { title: "cookie-run-frozen-tower", artist: "dev sisters", url: "https://github.com/joonk2/music/raw/music/cookie-run-frozen-tower.mp3" }
    ];

    let audio = new Audio();
    let currentIdx = 0;
    let isPlaying = false;

    function loadTrack(idx) {
        currentIdx = idx;
        audio.src = musicData[idx].url;
        document.getElementById('m-title').innerText = musicData[idx].title;
        document.getElementById('m-artist').innerText = musicData[idx].artist;
    }

    function togglePlay() {
        if (isPlaying) { audio.pause(); } else { audio.play(); }
        isPlaying = !isPlaying;
        updateUI();
    }

    function updateUI() {
        document.getElementById('m-play').innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
        document.getElementById('album-art').classList.toggle('playing', isPlaying);
    }

    function nextMusic() { currentIdx = (currentIdx + 1) % musicData.length; playTrack(); }
    function prevMusic() { currentIdx = (currentIdx - 1 + musicData.length) % musicData.length; playTrack(); }
    
    function playTrack() {
        loadTrack(currentIdx);
        audio.play();
        isPlaying = true;
        updateUI();
    }

    audio.addEventListener('timeupdate', () => {
        const pc = (audio.currentTime / audio.duration) * 100;
        document.getElementById('p-fill').style.width = pc + '%';
    });

    audio.addEventListener('ended', nextMusic);

    document.getElementById('p-container').onclick = (e) => {
        const rect = e.target.getBoundingClientRect();
        const pc = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pc * audio.duration;
    };

    // Start
    loadTrack(0);
    
    // 자동 재생 시도 (사용자 클릭으로 팝업이 열렸으므로 가능)
    window.onload = () => {
        setTimeout(() => {
            audio.play().then(() => {
                isPlaying = true;
                updateUI();
            }).catch(e => console.log("자동 재생 방지됨:", e));
        }, 500);
    };

</script>
</body>
</html>
