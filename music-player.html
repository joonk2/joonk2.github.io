<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 AI Cat Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap');

        :root {
            --primary-color: #ff6b9d;
            --secondary-color: #ff8fab;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #333333;
            --text-secondary: #666666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 350px;
            height: 650px;
            background: var(--glass-bg);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Tabs */
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; }
        .tab-btn {
            flex: 1; padding: 15px; border: none; background: none; cursor: pointer;
            font-weight: 600; color: #aaa; transition: all 0.3s; font-size: 0.9em;
        }
        .tab-btn.active { color: var(--primary-color); border-bottom: 3px solid var(--primary-color); }

        /* View Content */
        .view-content { flex: 1; display: none; flex-direction: column; overflow-y: auto; background: white; }
        .view-content.active { display: flex; }

        /* Chat View */
        #chat-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 0.9em; line-height: 1.4; }
        .msg.bot { align-self: flex-start; background: #f0f0f0; color: #333; border-bottom-left-radius: 2px; }
        .msg.user { align-self: flex-end; background: var(--primary-color); color: white; border-bottom-right-radius: 2px; }

        .input-area { padding: 10px; display: flex; gap: 8px; background: white; border-top: 1px solid #eee; }
        #user-input { flex: 1; border: 1px solid #ddd; padding: 8px 12px; border-radius: 20px; outline: none; font-size: 0.9em; }
        #send-btn { background: var(--primary-color); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }

        /* Playlist View */
        .playlist-header { padding: 20px; text-align: center; background: #fffafb; }
        .playlist-header img { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; }
        .playlist-list { padding: 10px; }
        .playlist-item {
            padding: 12px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer;
            border-radius: 12px; transition: background 0.2s; margin-bottom: 5px;
        }
        .playlist-item:hover { background: #fff0f3; }
        .playlist-item.active { background: #ffe5ea; color: var(--primary-color); font-weight: 700; }

        /* Mini Player */
        .mini-player {
            background: #fff; padding: 12px 15px; border-top: 1px solid #eee;
            display: flex; align-items: center; gap: 12px;
        }
        .mini-album-art { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; animation: rotate 10s linear infinite; animation-play-state: paused; }
        .mini-album-art.playing { animation-play-state: running; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .mini-info { flex: 1; overflow: hidden; }
        .mini-info h4 { font-size: 0.85em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-controls { display: flex; gap: 12px; font-size: 1.1em; color: #555; }
        .mini-controls i { cursor: pointer; }

        /* API Key Overlay */
        #api-key-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.98); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100; padding: 30px; text-align: center;
        }
        #api-key-input { margin: 15px 0; padding: 10px; border-radius: 10px; border: 1px solid #ddd; width: 90%; }
        .save-key-btn { background: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }

    </style>
</head>
<body>

<div class="container">
    <div id="api-key-overlay">
        <h3>🔑 Gemini API Key 설정</h3>
        <p style="font-size: 0.85em; color: #666; margin-top: 10px;">대화를 위해 API 키를 한 번만 입력해주세요!</p>
        <input type="password" id="api-key-input" placeholder="여기에 키 입력">
        <button class="save-key-btn" onclick="saveApiKey()">설정 완료</button>
        <a href="https://aistudio.google.com/app/apikey" target="_blank" style="font-size: 0.75em; margin-top: 15px; color: var(--primary-color);">무료 키 받기 (클릭)</a>
    </div>

    <div class="tabs">
        <button class="tab-btn" id="tab-chat" onclick="showView('chat')"><i class="fas fa-comment-dots"></i> AI 고양이</button>
        <button class="tab-btn" id="tab-music" onclick="showView('music')"><i class="fas fa-music"></i> 플레이리스트</button>
    </div>

    <div id="view-chat" class="view-content">
        <div id="chat-area">
            <div class="msg bot">안녕! 나는 이 블로그의 AI 고양이 집사다냥! 궁금한 게 있으면 무엇이든 물어보라옹~ 🐾</div>
        </div>
        <div id="typing-indicator" style="padding-left: 15px; font-size: 0.75em; color: #aaa; display: none; margin-bottom: 5px;">고양이가 생각 중...</div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendMessage()">
            <button id="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="view-music" class="view-content">
        <div class="playlist-header">
            <img src="https://github.com/joonk2/mySvg/blob/main/chill-kitty-loop-unlimited.gif?raw=true" alt="cat">
            <h3 style="font-size: 1em; color: var(--primary-color);">My Playlist 🎵</h3>
        </div>
        <div class="playlist-list" id="playlist-items"></div>
    </div>

    <div class="mini-player">
        <img src="https://github.com/joonk2/mySvg/blob/main/chill-kitty-loop-unlimited.gif?raw=true" class="mini-album-art" id="m-art">
        <div class="mini-info"><h4 id="m-title">곡을 불러오는 중...</h4></div>
        <div class="mini-controls">
            <i class="fas fa-step-backward" onclick="prevMusic()"></i>
            <i class="fas fa-play" id="m-play-icon" onclick="togglePlay()"></i>
            <i class="fas fa-step-forward" onclick="nextMusic()"></i>
        </div>
    </div>
</div>

<script>
    const CONST_API_KEY = ""; // 보안상 비워둡니다.

    const musicData = [       
        { title: "i love egg", artist: "i-love-egg", url: "https://github.com/joonk2/music/raw/music/i-love-egg.mp3" },
        { title: "cookier-run-violin", artist: "dev sisters", url: "https://github.com/joonk2/music/raw/music/cookier-run-violin.mp3" },
        { title: "fantasy-01", artist: "Joonhwan.K", url: "https://github.com/joonk2/music/raw/music/suno-fantasy-01.mp3" },          
        { title: "cookie-run-frozen-tower", artist: "dev sisters", url: "https://github.com/joonk2/music/raw/music/cookie-run-frozen-tower.mp3" }
    ];

    let API_KEY = CONST_API_KEY || localStorage.getItem('GEMINI_API_KEY');
    let audio = new Audio();
    let currentIdx = 0;
    let isPlaying = false;

    function showView(view) {
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + view).classList.add('active');
        document.getElementById('tab-' + view).classList.add('active');

        if (view === 'chat' && !API_KEY) {
            document.getElementById('api-key-overlay').style.display = 'flex';
        } else {
            document.getElementById('api-key-overlay').style.display = 'none';
        }
    }

    function createPlaylist() {
        const list = document.getElementById('playlist-items');
        musicData.forEach((song, i) => {
            const item = document.createElement('div');
            item.className = 'playlist-item';
            item.id = 'item-' + i;
            item.innerHTML = `<i class="fas fa-play" style="font-size:0.7em; margin-right:8px; opacity:0.5;"></i> ${song.title}`;
            item.onclick = () => playTrack(i);
            list.appendChild(item);
        });
    }

    function loadTrack(idx) {
        currentIdx = idx;
        audio.src = musicData[idx].url;
        document.getElementById('m-title').innerText = musicData[idx].title;
        document.querySelectorAll('.playlist-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById('item-' + idx);
        if (activeItem) activeItem.classList.add('active');
    }

    function playTrack(idx) {
        loadTrack(idx);
        audio.play().catch(e => console.log("Auto-play error:", e));
        isPlaying = true;
        updatePlayerUI();
    }

    function togglePlay() {
        if (isPlaying) { audio.pause(); } else { audio.play().catch(e => console.log(e)); }
        isPlaying = !isPlaying;
        updatePlayerUI();
    }

    function updatePlayerUI() {
        document.getElementById('m-play-icon').className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
        document.getElementById('m-art').classList.toggle('playing', isPlaying);
    }

    function nextMusic() { currentIdx = (currentIdx + 1) % musicData.length; playTrack(currentIdx); }
    function prevMusic() { currentIdx = (currentIdx - 1 + musicData.length) % musicData.length; playTrack(currentIdx); }
    audio.onended = nextMusic;

    function saveApiKey() {
        const key = document.getElementById('api-key-input').value.trim();
        if (key) {
            localStorage.setItem('GEMINI_API_KEY', key);
            API_KEY = key;
            document.getElementById('api-key-overlay').style.display = 'none';
        }
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text || !API_KEY) return;
        appendMessage('user', text);
        input.value = '';
        document.getElementById('typing-indicator').style.display = 'block';
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: `너는 기술 블로그 고양이 챗봇이야. 말끝마다 '냥', '야옹'을 붙여줘. 
                        코딩, 수학, 알고리즘 질문에 친절히 답해줘. 질문: ${text}` }]
                    }]
                })
            });
            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;
            appendMessage('bot', reply);
        } catch (e) {
            appendMessage('bot', '냥... API 키가 잘못되었거나 오류가 났다옹! 키 설정을 다시 확인해달라냥.');
        } finally {
            document.getElementById('typing-indicator').style.display = 'none';
        }
    }

    function appendMessage(sender, text) {
        const area = document.getElementById('chat-area');
        const d = document.createElement('div');
        d.className = 'msg ' + sender;
        d.innerText = text;
        area.appendChild(d);
        area.scrollTop = area.scrollHeight;
    }

    // --- 즉시 실행부 ---
    (function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'chat';
        
        createPlaylist();
        loadTrack(0);
        showView(mode);

        // 팝업이 열리면 무조건 음악 재생 시도
        setTimeout(() => {
            playTrack(0);
        }, 300);
    })();
</script>
</body>
</html>
